name: Import Posts from JSON

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Import posts from JSON
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const INPUT = 'posts-import.json';
          const POSTS_DIR = 'src/content/posts';

          if (!fs.existsSync(INPUT)) {
            console.error('Input file not found: ' + INPUT);
            console.error('Please create posts-import.json in the repository root before running this workflow.');
            process.exit(1);
          }

          const posts = JSON.parse(fs.readFileSync(INPUT, 'utf-8'));
          if (!Array.isArray(posts) || posts.length === 0) {
            console.error('posts-import.json is empty or not a valid array.');
            process.exit(1);
          }

          if (!fs.existsSync(POSTS_DIR)) {
            fs.mkdirSync(POSTS_DIR, { recursive: true });
          }

          function toYamlValue(val) {
            if (typeof val === 'string') {
              if (val.includes(':') || val.includes('#') || val.includes('\"') || val.startsWith('[') || val.startsWith('{') || val === '') {
                return '\"' + val.replace(/\\\\/g, '\\\\\\\\').replace(/\"/g, '\\\\\"') + '\"';
              }
              return val;
            }
            return String(val);
          }

          function buildFrontmatter(post) {
            const lines = ['---'];
            if (post.title) lines.push('title: ' + toYamlValue(post.title));
            if (post.published) lines.push('published: ' + post.published);
            if (post.updated) lines.push('updated: ' + post.updated);
            if (post.draft) lines.push('draft: true');
            if (post.description) lines.push('description: ' + toYamlValue(post.description));
            if (post.image) lines.push('image: ' + toYamlValue(post.image));
            if (Array.isArray(post.tags) && post.tags.length > 0) {
              lines.push('tags: [' + post.tags.map(t => toYamlValue(t)).join(', ') + ']');
            }
            if (post.category) lines.push('category: ' + toYamlValue(post.category));
            if (post.lang) lines.push('lang: ' + toYamlValue(post.lang));
            if (post.pinned) lines.push('pinned: true');
            if (post.author) lines.push('author: ' + toYamlValue(post.author));
            if (post.sourceLink) lines.push('sourceLink: ' + toYamlValue(post.sourceLink));
            if (post.licenseName) lines.push('licenseName: ' + toYamlValue(post.licenseName));
            if (post.licenseUrl) lines.push('licenseUrl: ' + toYamlValue(post.licenseUrl));
            if (post.comment === false) lines.push('comment: false');
            if (post.password) lines.push('password: ' + toYamlValue(post.password));
            if (post.passwordHint) lines.push('passwordHint: ' + toYamlValue(post.passwordHint));
            lines.push('---');
            return lines.join('\n');
          }

          function slugify(str) {
            return str
              .toLowerCase()
              .replace(/[^a-z0-9\u4e00-\u9fff]+/g, '-')
              .replace(/^-|-$/g, '')
              || 'untitled-' + Date.now();
          }

          let created = 0;
          let updated = 0;
          let skipped = 0;

          for (const post of posts) {
            if (!post.title && !post.slug) {
              console.log('Skipping post without title or slug.');
              skipped++;
              continue;
            }

            let filePath;
            if (post.filePath && post.filePath.endsWith('.md')) {
              filePath = post.filePath;
            } else {
              const slug = post.slug || slugify(post.title);
              const subDir = post.category ? slugify(post.category) : '';
              filePath = path.join(POSTS_DIR, subDir, slug + '.md');
            }

            const dir = path.dirname(filePath);
            if (!fs.existsSync(dir)) {
              fs.mkdirSync(dir, { recursive: true });
            }

            const frontmatter = buildFrontmatter(post);
            const body = post.body || '';
            const content = frontmatter + '\n\n' + body + '\n';

            if (fs.existsSync(filePath)) {
              updated++;
              console.log('Updated: ' + filePath);
            } else {
              created++;
              console.log('Created: ' + filePath);
            }

            fs.writeFileSync(filePath, content, 'utf-8');
          }

          console.log('\\nImport complete: ' + created + ' created, ' + updated + ' updated, ' + skipped + ' skipped.');
          "

      - name: Commit and push imported posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/
          git diff --cached --quiet || git commit -m "chore: import posts from posts-import.json"
          git push
