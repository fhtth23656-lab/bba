name: Export Posts to JSON

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Export posts to JSON
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const POSTS_DIR = 'src/content/posts';
          const OUTPUT = 'posts-export.json';

          function walkDir(dir) {
            let results = [];
            const list = fs.readdirSync(dir, { withFileTypes: true });
            for (const entry of list) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (['image', 'cover', 'images'].includes(entry.name)) continue;
                results = results.concat(walkDir(full));
              } else if (entry.name.endsWith('.md') || entry.name.endsWith('.mdx')) {
                results.push(full);
              }
            }
            return results;
          }

          function parseFrontmatter(content) {
            const match = content.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
            if (!match) return { data: {}, body: content };
            const yamlStr = match[1];
            const body = match[2];
            const data = {};
            yamlStr.split('\n').forEach(line => {
              const idx = line.indexOf(':');
              if (idx === -1) return;
              const key = line.slice(0, idx).trim();
              let val = line.slice(idx + 1).trim();
              if (val.startsWith('[') && val.endsWith(']')) {
                val = val.slice(1, -1).split(',').map(s => s.trim().replace(/^['\"]|['\"]$/g, ''));
              } else if (val === 'true') val = true;
              else if (val === 'false') val = false;
              else if (!isNaN(val) && val !== '') val = Number(val);
              else val = val.replace(/^['\"]|['\"]$/g, '');
              if (key) data[key] = val;
            });
            return { data, body: body.trim() };
          }

          if (!fs.existsSync(POSTS_DIR)) {
            console.log('Posts directory not found:', POSTS_DIR);
            fs.writeFileSync(OUTPUT, JSON.stringify([], null, 2));
            process.exit(0);
          }

          const files = walkDir(POSTS_DIR);
          const posts = files.map(file => {
            const content = fs.readFileSync(file, 'utf-8');
            const { data, body } = parseFrontmatter(content);
            const relPath = path.relative(POSTS_DIR, file).replace(/\\\\/g, '/');
            const slug = relPath.replace(/\\.mdx?$/, '');
            return {
              slug,
              filePath: file.replace(/\\\\/g, '/'),
              title: data.title || slug,
              published: data.published || data.date || '',
              updated: data.updated || '',
              draft: data.draft || false,
              description: data.description || '',
              image: data.image || '',
              tags: Array.isArray(data.tags) ? data.tags : (data.tags ? [data.tags] : []),
              category: data.category || '',
              lang: data.lang || '',
              pinned: data.pinned || false,
              author: data.author || '',
              sourceLink: data.sourceLink || '',
              licenseName: data.licenseName || '',
              licenseUrl: data.licenseUrl || '',
              comment: data.comment !== false,
              password: data.password || '',
              passwordHint: data.passwordHint || '',
              body
            };
          });

          posts.sort((a, b) => {
            const da = new Date(a.published || 0);
            const db = new Date(b.published || 0);
            return db - da;
          });

          fs.writeFileSync(OUTPUT, JSON.stringify(posts, null, 2), 'utf-8');
          console.log('Exported ' + posts.length + ' posts to ' + OUTPUT);
          "

      - name: Commit and push exported JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts-export.json
          git diff --cached --quiet || git commit -m "chore: export posts to posts-export.json"
          git push
