# PagesCMS 配置 - fffazz 博客 (Firefly-Mod)
# 基于 PagesCMS v2.x 官方 schema 编写
# 文档: https://pagescms.org/docs/configuration/

media:
  # 文章配图 - 上传到文章目录的 image 子文件夹
  - name: post-images
    label: 文章配图
    input: src/content/posts
    output: /
    categories: [image]

  # public 静态资源 - 封面图、头像等
  - name: assets
    label: 站点资源
    input: public/assets
    output: /assets
    categories: [image]

content:
  # ============================================================
  # 📝 内容页面
  # ============================================================
  - name: content-pages
    label: 📝 内容页面
    type: group
    items:
      # 博客文章 (collection)
      - name: posts
        label: 📝 博客文章
        type: collection
        path: src/content/posts
        format: yaml-frontmatter
        extension: .md
        filename:
          template: "{primary}.md"
          field: create
        exclude: ["**/image/**", "**/cover/**", "**/*.avif", "**/*.webp", "**/*.png", "**/*.jpg"]
        view:
          primary: title
          fields: [title, published, tags, category, draft, pinned]
          sort: ["published desc", "title asc"]
          search: [title, description, tags, category]
          default:
            sort: published
            order: desc
        fields:
          - name: title
            label: 标题
            type: string
            required: true
            description: 文章标题

          - name: published
            label: 发布时间
            type: date
            required: true
            options:
              time: false
              format: yyyy-MM-dd

          - name: updated
            label: 更新时间
            type: date
            options:
              time: false
              format: yyyy-MM-dd

          - name: draft
            label: 草稿
            type: boolean
            default: false

          - name: description
            label: 文章摘要
            type: text
            description: 简短描述，留空则自动截取正文

          - name: image
            label: 封面图
            type: image
            description: 文章封面图片路径

          - name: tags
            label: 标签
            type: select
            options:
              multiple: true
              creatable: true

          - name: category
            label: 分类
            type: string
            description: 文章分类（如"学习文档"、"项目实战"）

          - name: lang
            label: 语言
            type: select
            options:
              values:
                - { label: 中文, value: "" }
                - { label: English, value: en }
                - { label: 日本語, value: ja }
                - { label: 繁體中文, value: zh_TW }

          - name: pinned
            label: 置顶
            type: boolean
            default: false

          - name: author
            label: 作者
            type: string
            description: 覆盖默认作者名（通常留空）

          - name: sourceLink
            label: 原文链接
            type: string
            description: 转载/翻译文章的原始出处

          - name: licenseName
            label: 许可协议名称
            type: string
            description: 如 CC BY-NC-SA 4.0

          - name: licenseUrl
            label: 许可协议链接
            type: string

          - name: comment
            label: 启用评论
            type: boolean
            default: true

          - name: password
            label: 文章密码
            type: string
            description: 设置后需要密码才能查看（留空为公开）

          - name: passwordHint
            label: 密码提示
            type: string
            description: 提示访问者密码是什么

          - name: body
            label: 正文
            type: rich-text
            required: true

      # 关于页面
      - name: about
        label: 📄 关于页面
        type: file
        path: src/content/spec/about.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: 页面标题
            type: string
            default: "关于我"
          - name: body
            label: 正文
            type: rich-text

      # 友情链接
      - name: friends
        label: 🔗 友情链接
        type: file
        path: src/content/spec/friends.mdx
        format: yaml-frontmatter
        fields:
          - name: title
            label: 页面标题
            type: string
            default: 友情链接
          - name: description
            label: 页面描述
            type: string
          - name: body
            label: 正文
            type: code
            options:
              format: mdx
            description: MDX 格式（包含 JSX 组件），使用代码模式编辑

      # 留言板
      - name: guestbook
        label: 📬 留言板
        type: file
        path: src/content/spec/guestbook.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: 页面标题
            type: string
            default: 留言板
          - name: body
            label: 正文
            type: rich-text

  # ============================================================
  # ⚙️ 站点设置
  # ============================================================
  - name: site-settings
    label: ⚙️ 站点设置
    type: group
    description: 核心站点配置，包括标题、域名、SEO、首页个人信息等
    items:
      - name: site-config
        label: 🌐 站点主配置
        type: file
        path: src/config/siteConfig.ts
        format: code
        description: 站点标题、URL、主题色、分页、页面开关等核心设置

      - name: home-config
        label: 🏠 首页配置
        type: file
        path: src/config/homeConfig.ts
        format: code
        description: 头像、名字、身份标签、个人签名、社交链接、技能图标等首页内容

      - name: announcement-config
        label: 📢 公告栏
        type: file
        path: src/config/announcementConfig.ts
        format: code
        description: 博客顶部公告栏的标题、内容和链接配置

      - name: license-config
        label: 📜 许可协议
        type: file
        path: src/config/licenseConfig.ts
        format: code
        description: 文章底部版权声明（如 CC BY-NC-SA 4.0）

  # ============================================================
  # 🎨 布局与外观
  # ============================================================
  - name: layout-appearance
    label: 🎨 布局与外观
    type: group
    description: 导航栏、侧边栏、字体、封面图、代码块样式等视觉相关配置
    items:
      - name: nav-bar-config
        label: 🧭 导航栏
        type: file
        path: src/config/navBarConfig.ts
        format: code
        description: 导航栏菜单项、链接预设和搜索配置

      - name: sidebar-config
        label: 📐 侧边栏布局
        type: file
        path: src/config/sidebarConfig.ts
        format: code
        description: 侧边栏位置、组件（个人资料、公告、音乐、分类、标签等）的显示和排序

      - name: footer-config
        label: 📏 页脚设置
        type: file
        path: src/config/footerConfig.ts
        format: code
        description: 页脚社交链接、版权信息、备案号等

      - name: font-config
        label: 🔤 字体设置
        type: file
        path: src/config/fontConfig.ts
        format: code
        description: 全局字体、横幅字体、Google Fonts、子集化等配置

      - name: cover-image-config
        label: 🖼️ 文章封面图
        type: file
        path: src/config/coverImageConfig.ts
        format: code
        description: 文章详情页封面图显示和随机图 API 配置

      - name: expressive-code-config
        label: 💻 代码块样式
        type: file
        path: src/config/expressiveCodeConfig.ts
        format: code
        description: 代码高亮主题、折叠插件、语言徽章等代码块配置

  # ============================================================
  # 🔧 功能配置
  # ============================================================
  - name: feature-settings
    label: 🔧 功能配置
    type: group
    description: 评论、统计、音乐、打赏、友链、日历、收藏、AI搜索等功能模块配置
    items:
      - name: comment-config
        label: 💬 评论系统
        type: file
        path: src/config/commentConfig.ts
        format: code
        description: Twikoo / Waline / Giscus / Artalk / Disqus 评论系统配置

      - name: analytics-config
        label: 📊 数据统计
        type: file
        path: src/config/analyticsConfig.ts
        format: code
        description: Google Analytics、Microsoft Clarity、Umami、51la 统计配置

      - name: music-config
        label: 🎵 音乐播放器
        type: file
        path: src/config/musicConfig.ts
        format: code
        description: 音乐播放模式（Meting API / 本地音乐）、播放列表、歌词设置

      - name: sponsor-config
        label: 💰 打赏页面
        type: file
        path: src/config/sponsorConfig.ts
        format: code
        description: 打赏用途、支付方式（支付宝/微信/Ko-fi/爱发电）、赞助者列表

      - name: friends-data
        label: 🔗 友链数据
        type: file
        path: src/config/friendsConfig.ts
        format: code
        description: 友链列表（站点名、头像、描述、链接、标签、权重）

      - name: gallery-config
        label: 🖼️ 相册配置
        type: file
        path: src/config/galleryConfig.ts
        format: code
        description: 相册列表（ID、名称、描述、地点、日期、标签、密码）和布局设置

      - name: pio-config
        label: 🎭 看板娘
        type: file
        path: src/config/pioConfig.ts
        format: code
        description: Spine / Live2D 看板娘模型、位置、交互、气泡提示配置

      - name: calendar-config
        label: 📅 日历配置
        type: file
        path: src/config/calendarConfig.ts
        format: code
        description: 节日、生日、纪念日、自定义安排等日历页面配置

      - name: collections-config
        label: 📦 收藏API
        type: file
        path: src/config/collectionsApiConfig.ts
        format: code
        description: 收藏网站列表（工具箱、AI助手、组件库、学习知识库等分类）

      - name: ai-search-config
        label: 🤖 AI搜索
        type: file
        path: src/config/aiSearchConfig.ts
        format: code
        description: AI 搜索引擎配置（模型、API密钥、搜索参数等）

      - name: plantuml-config
        label: 📐 PlantUML 图表
        type: file
        path: src/config/plantumlConfig.ts
        format: code
        description: PlantUML 服务器地址和明暗主题配置

settings:
  content:
    merge: false
